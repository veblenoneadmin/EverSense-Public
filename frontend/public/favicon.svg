<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="circlegrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007acc"/>
      <stop offset="100%" style="stop-color:#005a9e"/>
    </linearGradient>
    <linearGradient id="wgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007acc"/>
      <stop offset="100%" style="stop-color:#29b6f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main circle -->
  <circle cx="16" cy="16" r="15" fill="url(#circlegrad)"/>
  <!-- Inner subtle ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <!-- White checkmark -->
  <path d="M7 16 L13 22 L25 9" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Fireflies -->
  <circle cx="16" cy="1"  r="1.5" fill="#29b6f6" filter="url(#glow)"/>
  <circle cx="29" cy="7"  r="1.2" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="31" cy="21" r="1"   fill="#29b6f6" filter="url(#glow)" opacity="0.8"/>
  <circle cx="3"  cy="9"  r="1"   fill="#29b6f6" filter="url(#glow)" opacity="0.8"/>
  <circle cx="1"  cy="22" r="1.2" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="10" cy="31" r="1"   fill="#29b6f6" filter="url(#glow)" opacity="0.7"/>
  <circle cx="23" cy="31" r="0.9" fill="#00e5ff" filter="url(#glow)" opacity="0.7"/>
</svg>
